  body {

    border-bottom: 2px solid #e0e3e8;

  .header h1 {
    font-size: 26px;
    font-weight: 700;
    color: #1a1a2e;
    letter-spacing: 0.5px;
  }
  .header h1 span.accent { color: #6264A7; }
  .header .subtitle {
    font-size: 13px;
    color: #6b7280;
    margin-top: 4px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  .header .badge {
    display: inline-block;
    background: #6264A7;
    color: #fff;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 10px;
    margin-left: 8px;
    vertical-align: middle;
    letter-spacing: 0.5px;
  }

  /* SVG Canvas */
  .diagram-container {
    width: 100%;
    overflow: visible;
  }

  svg text { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif; }

  /* Legend */
  .legend-box {
    stroke: #d1d5db;
    stroke-width: 1;
    fill: #fafbfc;
    rx: 6;
  }

  /* Footer */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 18px;
    padding-top: 14px;
    border-top: 2px solid #e0e3e8;
    font-size: 11px;
    color: #9ca3af;
  }
  .footer .left { font-weight: 500; }
  .footer .right { text-align: right; }

  /* Tooltip style */
  .layer-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    fill: #9ca3af;
